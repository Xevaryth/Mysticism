<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mysticism Config Generator</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #0e0b13; color: #eeeaf7; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 48px 20px; }
    main { width: min(760px, 100%); margin: auto; }
    h1 { margin: 0 0 8px; font-family: Georgia, serif; font-size: clamp(34px, 7vw, 56px); }
    p { color: #b6afc2; line-height: 1.6; }
    .panel { margin-top: 32px; padding: 24px; border: 1px solid #373040; background: #17121e; }
    label { display: grid; grid-template-columns: 1fr 130px; align-items: center; gap: 20px; margin: 18px 0; }
    label span { display: grid; gap: 4px; }
    small { color: #948ba1; }
    input { width: 100%; padding: 10px; border: 1px solid #554765; background: #0c0910; color: inherit; }
    pre { min-height: 130px; margin: 24px 0 0; padding: 20px; overflow: auto; border: 1px solid #373040; background: #08060b; color: #d8c9ff; line-height: 1.7; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button { padding: 10px 16px; border: 1px solid #776091; background: #241a30; color: inherit; cursor: pointer; }
    button.primary { background: #ab85dd; color: #120d17; font-weight: 700; }
    a { color: #c9a8f1; }
    @media (max-width: 520px) { label { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <a href="README.md">← Wiki</a>
    <h1>Config generator</h1>
    <p>Create a server configuration for Mysticism. Everything runs in this file.</p>

    <section class="panel">
      <label>
        <span><strong>Starting maximum mana</strong><small>0 to 9999</small></span>
        <input id="maximum" type="number" min="0" max="9999" step="1" value="40">
      </label>
      <label>
        <span><strong>Regeneration per second</strong><small>0.0 to 1024.0</small></span>
        <input id="regeneration" type="number" min="0" max="1024" step="0.1" value="1.0">
      </label>
      <pre id="output" aria-live="polite"></pre>
      <div class="actions">
        <button id="copy" type="button">Copy</button>
        <button id="download" class="primary" type="button">Download mysticism-server.toml</button>
      </div>
    </section>
  </main>

  <script>
    const maximum = document.querySelector('#maximum');
    const regeneration = document.querySelector('#regeneration');
    const output = document.querySelector('#output');
    const copy = document.querySelector('#copy');
    const download = document.querySelector('#download');

    const clamp = (value, minimum, maximumValue) => Math.min(maximumValue, Math.max(minimum, Number(value) || 0));

    function config() {
      const maximumValue = Math.floor(clamp(maximum.value, 0, 9999));
      const regenerationValue = clamp(regeneration.value, 0, 1024);
      maximum.value = maximumValue;
      regeneration.value = regenerationValue.toFixed(1);
      return `[mana]\nstartingMaxMana = ${maximumValue}\nstartingManaRegenPerSecond = ${regenerationValue.toFixed(1)}\n`;
    }

    function update() {
      output.textContent = config();
    }

    maximum.addEventListener('input', update);
    regeneration.addEventListener('input', update);

    copy.addEventListener('click', async () => {
      await navigator.clipboard.writeText(config());
      copy.textContent = 'Copied';
      setTimeout(() => copy.textContent = 'Copy', 1200);
    });

    download.addEventListener('click', () => {
      const blob = new Blob([config()], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'mysticism-server.toml';
      link.click();
      URL.revokeObjectURL(url);
    });

    update();
  </script>
</body>
</html>
